version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: frontend
    container_name: code-mode-agents-frontend
    ports:
      - '80:80'
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - code-mode-network
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: backend
    container_name: code-mode-agents-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_KEY=${API_KEY}
      - API_URL=${API_URL}
      - MODEL_NAME=${MODEL_NAME:-gpt-4}
    depends_on:
      - redis
    networks:
      - code-mode-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:3000/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: code-mode-agents-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - code-mode-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
    driver: local

networks:
  code-mode-network:
    driver: bridge
